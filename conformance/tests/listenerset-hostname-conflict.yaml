apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gateway-with-listenerset-hostname-conflict
  namespace: gateway-conformance-infra
spec:
  gatewayClassName: "{GATEWAY_CLASS_NAME}"
  allowedListeners:
    namespaces:
      from: Same
  listeners:
  - name: gateway-listener
    port: 80
    protocol: HTTP
    hostname: "gateway-listener.com"
    allowedRoutes:
      namespaces:
        from: All
  # The following listener should be accepted based on listener precedence
  - name: hostname-conflict-with-gateway-listener
    port: 80
    protocol: HTTP
    hostname: "hostname-conflict-with-gateway-listener.com"
    allowedRoutes:
      namespaces:
        from: All
---
# The listener `hostname-conflict-with-gateway-listener` should be rejected but the listenerSet should be accepted since it has other valid listeners
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: listenerset-with-hostname-conflict-with-gateway-1
  namespace: gateway-conformance-infra
spec:
  parentRef:
    kind: Gateway
    group: gateway.networking.k8s.io
    name: gateway-with-listenerset-hostname-conflict
    namespace: gateway-conformance-infra
  listeners:
  - name: listener-set-1-listener
    port: 80
    protocol: HTTP
    hostname: "listener-set-1-listener.com"
    allowedRoutes:
      namespaces:
        from: All
  # The following listener should be rejected since it conflicts with the gateway listener
  - name: hostname-conflict-with-gateway-listener
    port: 80
    protocol: HTTP
    hostname: "hostname-conflict-with-gateway-listener.com"
    allowedRoutes:
      namespaces:
        from: All
  # The following listener should be accepted based on listener precedence
  - name: hostname-conflict-with-listener-set-listener
    port: 80
    protocol: HTTP
    hostname: "hostname-conflict-with-listener-set-listener.com"
    allowedRoutes:
      namespaces:
        from: All
---
# This listenerSet should not be accepted since its only listener `hostname-conflict-with-gateway-listener` is rejected
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: listenerset-with-hostname-conflict-with-gateway-2
  namespace: gateway-conformance-infra
spec:
  parentRef:
    kind: Gateway
    group: gateway.networking.k8s.io
    name: gateway-with-listenerset-hostname-conflict
    namespace: gateway-conformance-infra
  listeners:
  # The following listener should be rejected since it conflicts with the gateway listener
  - name: hostname-conflict-with-gateway-listener
    port: 80
    protocol: HTTP
    hostname: "hostname-conflict-with-gateway-listener.com"
    allowedRoutes:
      namespaces:
        from: All
---
# The listener `hostname-conflict-with-listener-set-listener` should be rejected but the listenerSet should be accepted since it has other valid listeners
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: listenerset-with-hostname-conflict-with-listener-set-1
  namespace: gateway-conformance-infra
spec:
  parentRef:
    kind: Gateway
    group: gateway.networking.k8s.io
    name: gateway-with-listenerset-hostname-conflict
    namespace: gateway-conformance-infra
  listeners:
  - name: listener-set-2-listener
    port: 80
    protocol: HTTP
    hostname: "listener-set-2-listener.com"
    allowedRoutes:
      namespaces:
        from: All
  # The following listener should be rejected since it conflicts with another listenerSet's listener
  - name: hostname-conflict-with-listener-set-listener
    port: 80
    protocol: HTTP
    hostname: "hostname-conflict-with-listener-set-listener.com"
    allowedRoutes:
      namespaces:
        from: All
---
# This listenerSet should not be accepted since its only listener `hostname-conflict-with-listener-set-listener` is rejected
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: listenerset-with-hostname-conflict-with-listener-set-2
  namespace: gateway-conformance-infra
spec:
  parentRef:
    kind: Gateway
    group: gateway.networking.k8s.io
    name: gateway-with-listenerset-hostname-conflict
    namespace: gateway-conformance-infra
  listeners:
  # The following listener should be rejected since it conflicts with another listenerSet's listener
  - name: hostname-conflict-with-listener-set-listener
    port: 80
    protocol: HTTP
    hostname: "hostname-conflict-with-listener-set-listener.com"
    allowedRoutes:
      namespaces:
        from: All
---
# --- Wildcard hostname conflict ---
# Verify that conflict detection also applies to wildcard hostnames.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gateway-ls-wildcard-conflict
  namespace: gateway-conformance-infra
spec:
  gatewayClassName: "{GATEWAY_CLASS_NAME}"
  listeners:
  - name: gateway-listener
    port: 80
    protocol: HTTP
    hostname: "gateway-wildcard-conflict-gw.com"
    allowedRoutes:
      namespaces:
        from: Same
  allowedListeners:
    namespaces:
      from: Same
---
# ls-wildcard-a is applied first (older creation timestamp) so it should
# win the wildcard-hostname conflict resolution.
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: ls-wildcard-a
  namespace: gateway-conformance-infra
spec:
  parentRef:
    kind: Gateway
    group: gateway.networking.k8s.io
    name: gateway-ls-wildcard-conflict
    namespace: gateway-conformance-infra
  listeners:
  # Wildcard hostname on port 80.  This listener should be accepted.
  - name: wildcard-listener
    port: 80
    protocol: HTTP
    hostname: "*.wildcard-hostname-conflict.com"
    allowedRoutes:
      namespaces:
        from: Same
---
# ls-wildcard-b is applied second (newer creation timestamp).  Its listener
# claims the identical wildcard hostname+port, which is a conflict.
# The listener must be marked Conflicted=True / Accepted=False.
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: ls-wildcard-b
  namespace: gateway-conformance-infra
spec:
  parentRef:
    kind: Gateway
    group: gateway.networking.k8s.io
    name: gateway-ls-wildcard-conflict
    namespace: gateway-conformance-infra
  listeners:
  # Same wildcard hostname and port as ls-wildcard-a — this is a conflict.
  - name: wildcard-listener
    port: 80
    protocol: HTTP
    hostname: "*.wildcard-hostname-conflict.com"
    allowedRoutes:
      namespaces:
        from: Same
---
# --- Cross-namespace hostname conflict precedence ---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gateway-ls-cross-ns-conflict
  namespace: gateway-conformance-infra
spec:
  gatewayClassName: "{GATEWAY_CLASS_NAME}"
  listeners:
  - name: gateway-listener
    port: 80
    protocol: HTTP
    hostname: "cross-ns-conflict-gw.com"
    allowedRoutes:
      namespaces:
        from: All
  allowedListeners:
    namespaces:
      from: All
---
apiVersion: v1
kind: Namespace
metadata:
  name: gateway-api-ls-conflict-ns-a
---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: ls-cross-ns-conflict-a
  namespace: gateway-api-ls-conflict-ns-a
spec:
  parentRef:
    kind: Gateway
    group: gateway.networking.k8s.io
    name: gateway-ls-cross-ns-conflict
    namespace: gateway-conformance-infra
  listeners:
  - name: conflict-listener
    port: 80
    protocol: HTTP
    hostname: "cross-ns-conflict.com"
    allowedRoutes:
      namespaces:
        from: All
  - name: unique-a-listener
    port: 80
    protocol: HTTP
    hostname: "unique-a.com"
    allowedRoutes:
      namespaces:
        from: All
---
apiVersion: v1
kind: Namespace
metadata:
  name: gateway-api-ls-conflict-ns-b
---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: ls-cross-ns-conflict-b
  namespace: gateway-api-ls-conflict-ns-b
spec:
  parentRef:
    kind: Gateway
    group: gateway.networking.k8s.io
    name: gateway-ls-cross-ns-conflict
    namespace: gateway-conformance-infra
  listeners:
  - name: conflict-listener
    port: 80
    protocol: HTTP
    hostname: "cross-ns-conflict.com"
    allowedRoutes:
      namespaces:
        from: All
  - name: unique-b-listener
    port: 80
    protocol: HTTP
    hostname: "unique-b.com"
    allowedRoutes:
      namespaces:
        from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-for-ls-a
  namespace: gateway-api-ls-conflict-ns-a
spec:
  parentRefs:
  - kind: ListenerSet
    group: gateway.networking.k8s.io
    name: ls-cross-ns-conflict-a
    namespace: gateway-api-ls-conflict-ns-a
    sectionName: conflict-listener
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /route-a
    backendRefs:
    - name: infra-backend-v1
      namespace: gateway-conformance-infra
      port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-for-ls-b-unique
  namespace: gateway-api-ls-conflict-ns-b
spec:
  parentRefs:
  - kind: ListenerSet
    group: gateway.networking.k8s.io
    name: ls-cross-ns-conflict-b
    namespace: gateway-api-ls-conflict-ns-b
    sectionName: unique-b-listener
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /route-b
    backendRefs:
    - name: infra-backend-v2
      namespace: gateway-conformance-infra
      port: 8080
---
kind: ReferenceGrant
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: ls-cross-ns-conflict-ref-grant
  namespace: gateway-conformance-infra
spec:
  from:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: gateway-api-ls-conflict-ns-a
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: gateway-api-ls-conflict-ns-b
  to:
  - group: ""
    kind: Service
