apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gateway-with-listener-sets-test-allowed-routes
  namespace: gateway-conformance-infra
spec:
  gatewayClassName: "{GATEWAY_CLASS_NAME}"
  listeners:
  - name: gateway-listener
    port: 80
    protocol: HTTP
    hostname: "gateway-listener.com"
    allowedRoutes:
      namespaces:
        from: All
  allowedListeners:
    namespaces:
      from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: listenerset-test-allowed-routes-namespaces
  namespace: gateway-conformance-infra
spec:
  parentRef:
    kind: Gateway
    group: gateway.networking.k8s.io
    name: gateway-with-listener-sets-test-allowed-routes
    namespace: gateway-conformance-infra
  listeners:
  - name: listener-set-listener-allowed-routes-all
    port: 80
    protocol: HTTP
    hostname: "listener-set-listener-allowed-routes-all.com"
    allowedRoutes:
      namespaces:
        from: All
  - name: listener-set-listener-allowed-routes-same
    port: 80
    protocol: HTTP
    hostname: "listener-set-listener-allowed-routes-same.com"
    allowedRoutes:
      namespaces:
        from: Same
  - name: listener-set-listener-allowed-routes-selector
    port: 80
    protocol: HTTP
    hostname: "listener-set-listener-allowed-routes-selector.com"
    allowedRoutes:
      namespaces:
        from: Selector
        selector:
          matchLabels:
            allowed: ns
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-in-same-namespace
  namespace: gateway-conformance-infra
spec:
  parentRefs:
  - kind: ListenerSet
    group: gateway.networking.k8s.io
    name: listenerset-test-allowed-routes-namespaces
    namespace: gateway-conformance-infra
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /route-in-same-namespace
    backendRefs:
    - name: infra-backend-v1
      port: 8080
---
# This namespace matches the label selector defined in `allowedListeners`
apiVersion: v1
kind: Namespace
metadata:
  name: gateway-api-routes-allowed-ns
  labels:
    allowed: ns
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-in-selected-namespace
  namespace: gateway-api-routes-allowed-ns
spec:
  parentRefs:
  - kind: ListenerSet
    group: gateway.networking.k8s.io
    name: listenerset-test-allowed-routes-namespaces
    namespace: gateway-conformance-infra
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /route-in-selected-namespace
    backendRefs:
    - name: infra-backend-v2
      namespace: gateway-conformance-infra
      port: 8080
---
# This namespace does not match the label selector defined in `allowedListeners`
apiVersion: v1
kind: Namespace
metadata:
  name: gateway-api-routes-not-allowed-ns
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-not-in-selected-namespace
  namespace: gateway-api-routes-not-allowed-ns
spec:
  parentRefs:
  - kind: ListenerSet
    group: gateway.networking.k8s.io
    name: listenerset-test-allowed-routes-namespaces
    namespace: gateway-conformance-infra
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /route-not-in-selected-namespace
    backendRefs:
    - name: infra-backend-v3
      namespace: gateway-conformance-infra
      port: 8080
---
# This namespace is created for the cross-namespace ListenerSet test
apiVersion: v1
kind: Namespace
metadata:
  name: gateway-api-ls-cross-ns
---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: listenerset-test-allowed-routes-cross-ns
  namespace: gateway-api-ls-cross-ns
spec:
  parentRef:
    kind: Gateway
    group: gateway.networking.k8s.io
    name: gateway-with-listener-sets-test-allowed-routes
    namespace: gateway-conformance-infra
  listeners:
  - name: listener-set-listener-allowed-routes-cross-ns-same
    port: 80
    protocol: HTTP
    hostname: "listener-set-listener-allowed-routes-cross-ns-same.com"
    allowedRoutes:
      namespaces:
        from: Same
---
# Route in the same namespace as the cross-namespace ListenerSet (should be accepted)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-in-listenerset-namespace
  namespace: gateway-api-ls-cross-ns
spec:
  parentRefs:
  - kind: ListenerSet
    group: gateway.networking.k8s.io
    name: listenerset-test-allowed-routes-cross-ns
    namespace: gateway-api-ls-cross-ns
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /route-in-listenerset-namespace
    backendRefs:
    - name: infra-backend-v1
      namespace: gateway-conformance-infra
      port: 8080
---
# Route in the Gateway's namespace (should be rejected by the cross-namespace ListenerSet)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-in-gateway-namespace
  namespace: gateway-conformance-infra
spec:
  parentRefs:
  - kind: ListenerSet
    group: gateway.networking.k8s.io
    name: listenerset-test-allowed-routes-cross-ns
    namespace: gateway-api-ls-cross-ns
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /route-in-gateway-namespace
    backendRefs:
    - name: infra-backend-v2
      port: 8080
---
kind: ReferenceGrant
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: listenerset-test-allowed-routes-namespaces-reference-grant
  namespace: gateway-conformance-infra
spec:
  from:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: gateway-api-routes-allowed-ns
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: gateway-api-routes-not-allowed-ns
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: gateway-api-ls-cross-ns
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: gateway-api-ls-selector-cross-ns
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: gateway-api-ls-selector-allowed-ns
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: gateway-api-ls-selector-denied-ns
  to:
  - group: ""
    kind: "Service"
---
# --- Cross-namespace ListenerSet with AllowedRoutes.From: Selector ---
# Verifies that a cross-namespace ListenerSet with a label-based namespace
# selector accepts routes only from namespaces matching the selector.
apiVersion: v1
kind: Namespace
metadata:
  name: gateway-api-ls-selector-cross-ns
---
apiVersion: v1
kind: Namespace
metadata:
  name: gateway-api-ls-selector-allowed-ns
  labels:
    ls-selector-test: allowed
---
apiVersion: v1
kind: Namespace
metadata:
  name: gateway-api-ls-selector-denied-ns
---
apiVersion: gateway.networking.k8s.io/v1
kind: ListenerSet
metadata:
  name: ls-selector-cross-ns
  namespace: gateway-api-ls-selector-cross-ns
spec:
  parentRef:
    kind: Gateway
    group: gateway.networking.k8s.io
    name: gateway-with-listener-sets-test-allowed-routes
    namespace: gateway-conformance-infra
  listeners:
  - name: ls-selector-listener
    port: 80
    protocol: HTTP
    hostname: "ls-selector-cross-ns.com"
    allowedRoutes:
      namespaces:
        from: Selector
        selector:
          matchLabels:
            ls-selector-test: allowed
---
# Route in the label-selected namespace (must be accepted)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-in-selector-allowed-ns
  namespace: gateway-api-ls-selector-allowed-ns
spec:
  parentRefs:
  - kind: ListenerSet
    group: gateway.networking.k8s.io
    name: ls-selector-cross-ns
    namespace: gateway-api-ls-selector-cross-ns
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /allowed
    backendRefs:
    - name: infra-backend-v1
      namespace: gateway-conformance-infra
      port: 8080
---
# Route in a non-selected namespace (must be rejected)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-in-selector-denied-ns
  namespace: gateway-api-ls-selector-denied-ns
spec:
  parentRefs:
  - kind: ListenerSet
    group: gateway.networking.k8s.io
    name: ls-selector-cross-ns
    namespace: gateway-api-ls-selector-cross-ns
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /denied
    backendRefs:
    - name: infra-backend-v2
      namespace: gateway-conformance-infra
      port: 8080
---
# Route in the ListenerSet's own namespace (no matching label, must be rejected)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: route-in-selector-ls-ns
  namespace: gateway-api-ls-selector-cross-ns
spec:
  parentRefs:
  - kind: ListenerSet
    group: gateway.networking.k8s.io
    name: ls-selector-cross-ns
    namespace: gateway-api-ls-selector-cross-ns
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /ls-ns
    backendRefs:
    - name: infra-backend-v3
      namespace: gateway-conformance-infra
      port: 8080
